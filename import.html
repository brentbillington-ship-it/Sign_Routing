async function doImport() {
  const url = document.getElementById('api-url').value.trim();
  if (!url) return alert('Paste your Apps Script URL first');

  const output = document.getElementById('output');
  output.textContent = 'Importing...\n';

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'bulkImport', routes: ROUTE_DATA })
    });
    const result = await resp.json();
    output.textContent += JSON.stringify(result, null, 2);

    if (result.success) {
      output.textContent += '\n\n✅ Import complete! ' + result.routes + ' routes, ' + result.stops + ' stops.';
      output.textContent += '\nYou can now open your main app.';
    } else {
      output.textContent += '\n\n❌ Error: ' + (result.error || 'Unknown');
    }
  } catch (e) {
    output.textContent += '\n❌ Failed: ' + e.message;
    output.textContent += '\n\nMake sure your Apps Script is deployed as a web app with "Anyone" access.';
  }
}
