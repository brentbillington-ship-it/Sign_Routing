  .header h1{font-size:20px;font-weight:700;color:#f0f6fc;letter-spacing:-0.3px}
  .header .stats{display:flex;gap:20px;margin-left:auto;font-size:13px;color:#8b949e}
  .header .stats span{font-weight:700;color:#f0f6fc}
  .container{display:flex;height:calc(100vh - 56px)}
  #map{flex:1;min-width:0}
  .sidebar{width:400px;overflow-y:auto;background:#0d1117;border-left:1px solid #30363d}
  .route-card{border-bottom:1px solid #21262d}
  .route-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .12s}
  .route-header:hover{background:#161b22}
  .route-badge{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
  .route-meta{flex:1}
  .route-meta .title{font-weight:600;font-size:14px;color:#e6edf3}
  .route-meta .info{font-size:11px;color:#8b949e;margin-top:1px}
  .route-toggle{color:#484f58;font-size:16px;transition:transform .2s}
  .route-card.open .route-toggle{transform:rotate(180deg)}
  .route-stops{display:none;padding:4px 14px 12px 56px}
  .route-card.open .route-stops{display:block}
  .stop{padding:5px 0;font-size:12px;color:#c9d1d9;display:flex;gap:7px;line-height:1.4}
  .stop-num{color:#484f58;font-weight:700;min-width:18px;text-align:right;flex-shrink:0}
  .stop-name{font-weight:600;color:#e6edf3}
  .stop-notes{color:#d29922;font-size:10px;font-weight:600}
  .stop-signs{color:#a371f7;font-size:10px;font-weight:600}
  .route-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .route-link{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;color:#fff;border-radius:5px;text-decoration:none;font-size:12px;font-weight:600;transition:opacity .15s}
  .route-link:hover{opacity:.85}
  .route-link.gmaps{background:#1f6feb}
  .loading-msg{position:absolute;top:10px;right:10px;z-index:1000;background:rgba(13,17,23,.9);border:1px solid #30363d;border-radius:6px;padding:8px 14px;font-size:12px;color:#8b949e}
  .loading-msg.done{color:#3fb950}
  .loading-msg.fail{color:#f85149}
  .legend{position:absolute;bottom:16px;left:16px;z-index:1000;background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:6px;padding:10px 14px;font-size:11px}
  .legend-item{display:flex;align-items:center;gap:7px;padding:2px 0}
  .legend-dot{width:12px;height:12px;border-radius:50%}
  @media(max-width:768px){.container{flex-direction:column;height:auto}#map{height:50vh}.sidebar{width:100%;height:50vh}}

// ============================================================

var _seen = {};
for (var _i = 0; _i < PEOPLE.length; _i++) {

  if (!_seen[_r]) { _seen[_r] = true; ROUTE_LETTERS.push(_r); }
}
ROUTE_LETTERS.sort();

var ROUTES = [];
for (var _li = 0; _li < ROUTE_LETTERS.length; _li++) {
  var letter = ROUTE_LETTERS[_li];
  var stops = [];
  var total_signs = 0;
  for (var _pi = 0; _pi < PEOPLE.length; _pi++) {

    if (p.route === letter) {

  var link = 'https://www.google.com/maps/dir/' + stops.map(function(s) { return encodeURIComponent(s.address); }).join('/');
  ROUTES.push({ letter: letter, stops: stops, total_signs: total_signs, link: link, distance_mi: 0 });
}

// ============================================================
//  OSRM ROUTING with retry
// ============================================================
function fetchWithRetry(url, retries, delay) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', url);
    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch(e) { reject(e); }
      } else if (retries > 0) {
        setTimeout(function() {
          fetchWithRetry(url, retries - 1, delay * 2).then(resolve).catch(reject);
        }, delay);
      } else {
        reject(new Error('HTTP ' + xhr.status));
      }
    };
    xhr.onerror = function() {
      if (retries > 0) {
        setTimeout(function() {
          fetchWithRetry(url, retries - 1, delay * 2).then(resolve).catch(reject);
        }, delay);
      } else {
        reject(new Error('Network error'));
      }
    };
    xhr.send();
  });
}

function fetchOSRMTrip(stops) {
  var coords = '';
  for (var i = 0; i < stops.length; i++) {
    if (i > 0) coords += ';';
    coords += stops[i].lon + ',' + stops[i].lat;
  }
  var url = 'https://router.project-osrm.org/trip/v1/driving/' + coords + '?overview=full&geometries=geojson&roundtrip=false&source=any&destination=any';
  return fetchWithRetry(url, 3, 1500).then(function(data) {
    if (data.code === 'Ok' && data.trips && data.trips[0]) {
      var trip = data.trips[0];
      var geomCoords = [];
      for (var i = 0; i < trip.geometry.coordinates.length; i++) {
        var c = trip.geometry.coordinates[i];
        geomCoords.push([c[1], c[0]]);
      }
      var dist = (trip.distance / 1609.34).toFixed(1);
      var dur = Math.round(trip.duration / 60);
      // waypoints[i].waypoint_index = position-in-trip for input point i
      // We need: order[tripPosition] = inputIndex
      var order = new Array(stops.length);
      for (var i = 0; i < data.waypoints.length; i++) {
        order[data.waypoints[i].waypoint_index] = i;
      }
      return { coords: geomCoords, distance_mi: dist, duration_min: dur, order: order };
    }
    return null;
  }).catch(function(err) {
    console.error('OSRM trip error:', err);
    return null;
  });
}

function applyResult(ri, result) {
  var route = ROUTES[ri];
  var color = COLORS[ri % COLORS.length];
  if (!result) {
    var infoEl = document.getElementById('info-' + route.letter);
    if (infoEl) infoEl.textContent = route.total_signs + ' signs \u00b7 routing failed';
    return;
  }
  try {
    routeGroups[route.letter].removeLayer(routePolylines[route.letter]);
    routePolylines[route.letter] = L.polyline(result.coords, {
      color: color, weight: 4, opacity: 0.75
    }).addTo(routeGroups[route.letter]);
    var oldStops = route.stops.slice();
    var newStops = [];
    for (var i = 0; i < result.order.length; i++) { newStops.push(oldStops[result.order[i]]); }
    route.stops = newStops;
    var oldMarkers = routeMarkers[route.letter].slice();
    for (var newIdx = 0; newIdx < result.order.length; newIdx++) {
      (function(origIdx, newIdx) {
        var m = oldMarkers[origIdx];
        routeGroups[route.letter].removeLayer(m.number);
        m.number = L.marker([m.stop.lat, m.stop.lon], {
          icon: L.divIcon({
            html: '<div style="width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">' + (newIdx+1) + '</div>',
            className: '', iconSize: [16,16], iconAnchor: [8,8]
          }), interactive: false
        }).addTo(routeGroups[route.letter]);
        m.circle.setPopupContent(
          '<b style="font-size:12px;color:#333">Route ' + route.letter + ' \u00b7 #' + (newIdx+1) + '</b><br>' +
          '<b style="color:#333">' + m.stop.name + '</b><br><span style="color:#555">' + m.stop.address + '</span>' +
          (m.stop.signs > 1 ? '<br><span style="color:#7c3aed;font-weight:600">' + m.stop.signs + ' signs</span>' : '') +
          (m.stop.notes ? '<br><span style="color:#b45309;font-weight:600">' + m.stop.notes + '</span>' : '')
        );
      })(result.order[newIdx], newIdx);
    }
    var gmLink = 'https://www.google.com/maps/dir/';
    for (var i = 0; i < newStops.length; i++) {
      if (i > 0) gmLink += '/';
      gmLink += encodeURIComponent(newStops[i].address);
    }
    route.link = gmLink;
    var gmEl = document.getElementById('gmaps-' + route.letter);
    if (gmEl) gmEl.href = gmLink;
    var stopsEl = document.getElementById('stops-' + route.letter);
    if (stopsEl) {
      var html = '';
      for (var i = 0; i < newStops.length; i++) {
        var s = newStops[i];
        var extra = '';
        if (s.signs > 1) extra += ' <span class="stop-signs">(x' + s.signs + ')</span>';
        if (s.notes) extra += ' <span class="stop-notes">[' + s.notes + ']</span>';
        html += '<div class="stop"><span class="stop-num">' + (i+1) + '.</span><div><span class="stop-name">' + s.name + '</span><br>' + s.address + extra + '</div></div>';
      }
      html += '<div class="route-actions"><a class="route-link gmaps" id="gmaps-' + route.letter + '" href="' + gmLink + '" target="_blank">\ud83d\udccd Google Maps</a></div>';
      stopsEl.innerHTML = html;
    }
    route.osrm_dist = result.distance_mi;
    route.osrm_dur = result.duration_min;
    var infoEl2 = document.getElementById('info-' + route.letter);
    if (infoEl2) infoEl2.textContent = route.total_signs + ' signs \u00b7 ' + result.distance_mi + ' mi \u00b7 ~' + result.duration_min + ' min';
  } catch(e) {
    console.error('applyResult error for route ' + route.letter + ':', e);
    var infoEl3 = document.getElementById('info-' + route.letter);
    if (infoEl3) infoEl3.textContent = route.total_signs + ' signs \u00b7 error rendering route';
  }
}

// Cache
var CACHE_KEY = 'osrm_v8_' + ROUTES.length + '_' + PEOPLE.length;
function saveCache(allResults) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(allResults)); } catch(e) {}
}
function loadCache() {
  try { var c = localStorage.getItem(CACHE_KEY); return c ? JSON.parse(c) : null; } catch(e) { return null; }
}

function loadAllRoutes() {
  var cached = loadCache();
  if (cached && cached.length === ROUTES.length) {
    for (var i = 0; i < cached.length; i++) { applyResult(cached[i].ri, cached[i].result); }
    var el = document.getElementById('load-status');
    el.textContent = '\u2713 Routes loaded (cached)';
    el.className = 'loading-msg done';
    setTimeout(function() { el.style.display = 'none'; }, 2000);
    return;
  }

  // Process routes one at a time with delay
  var results = [];
  var el = document.getElementById('load-status');
  var idx = 0;

  function processNext() {
    if (idx >= ROUTES.length) {
      var anySuccess = false;
      for (var i = 0; i < results.length; i++) { if (results[i].result) { anySuccess = true; break; } }
      if (anySuccess) {
        saveCache(results);
        el.textContent = '\u2713 Routes optimized (street-level)';
        el.className = 'loading-msg done';
      } else {
        el.textContent = '\u2717 OSRM server unavailable \u2014 try refreshing later';
        el.className = 'loading-msg fail';
      }
      setTimeout(function() { el.style.display = 'none'; }, 5000);
      return;
    }
    el.textContent = 'Optimizing route ' + ROUTES[idx].letter + ' (' + (idx+1) + '/' + ROUTES.length + ')...';
    var currentIdx = idx;
    fetchOSRMTrip(ROUTES[currentIdx].stops).then(function(result) {
      results.push({ ri: currentIdx, result: result });
      applyResult(currentIdx, result);
      idx++;
      setTimeout(processNext, 500);
    });
  }
  processNext();
}

// Build sidebar
var sb = document.getElementById('sidebar');
for (var ri = 0; ri < ROUTES.length; ri++) {
  (function(ri) {
    var route = ROUTES[ri];
    var color = COLORS[ri % COLORS.length];
    var card = document.createElement('div');
    card.className = 'route-card';
    card.id = 'card-' + route.letter;
    var stopsHtml = '';
    for (var si = 0; si < route.stops.length; si++) {
      var s = route.stops[si];
      var extra = '';
      if (s.signs > 1) extra += ' <span class="stop-signs">(x' + s.signs + ')</span>';
      if (s.notes) extra += ' <span class="stop-notes">[' + s.notes + ']</span>';
      stopsHtml += '<div class="stop"><span class="stop-num">' + (si+1) + '.</span><div><span class="stop-name">' + s.name + '</span><br>' + s.address + extra + '</div></div>';
    }
    card.innerHTML =
      '<div class="route-header" onclick="toggleRoute(\'' + route.letter + '\')">' +
        '<div class="route-badge" style="background:' + color + '">' + route.letter + '</div>' +
        '<div class="route-meta"><div class="title">Route ' + route.letter + ' \u2014 ' + route.stops.length + ' stops</div>' +
        '<div class="info" id="info-' + route.letter + '">' + route.total_signs + ' signs \u00b7 optimizing...</div></div>' +
        '<div class="route-toggle">\u25BC</div></div>' +
      '<div class="route-stops" id="stops-' + route.letter + '">' + stopsHtml +
        '<div class="route-actions">' +
          '<a class="route-link gmaps" id="gmaps-' + route.letter + '" href="' + route.link + '" target="_blank">\ud83d\udccd Google Maps</a>' +
        '</div></div>';
    sb.appendChild(card);
  })(ri);
}

function toggleRoute(letter) {
  var card = document.getElementById('card-' + letter);
  var wasOpen = card.classList.contains('open');
  var cards = document.querySelectorAll('.route-card');
  for (var i = 0; i < cards.length; i++) { cards[i].classList.remove('open'); }
  if (!wasOpen) {
    card.classList.add('open');
    var pl = routePolylines[letter];
    try { map.fitBounds(pl.getBounds(), {padding: [40,40]}); } catch(e) {
      var route;
      for (var i = 0; i < ROUTES.length; i++) { if (ROUTES[i].letter === letter) { route = ROUTES[i]; break; } }
      var bounds = [];
      for (var i = 0; i < route.stops.length; i++) { bounds.push([route.stops[i].lat, route.stops[i].lon]); }
      map.fitBounds(L.latLngBounds(bounds), {padding: [40,40]});
    }
  }
}

var legend = L.control({position: 'bottomleft'});
legend.onAdd = function() {
  var div = L.DomUtil.create('div', 'legend');
  var html = '';
  for (var i = 0; i < ROUTES.length; i++) {
    html += '<div class="legend-item"><div class="legend-dot" style="background:' + COLORS[i % COLORS.length] + '"></div>Route ' + ROUTES[i].letter + ' (' + ROUTES[i].stops.length + ')</div>';
  }
  div.innerHTML = html;
  return div;
};
legend.addTo(map);
loadAllRoutes();
</script>
</body>
