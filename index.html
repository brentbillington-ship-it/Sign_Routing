: 6, "link": "https://www.google.com/maps/dir/1048%20Creek%20Crossing%2C%20Coppell%2C%20TX%2075019/204%20Driftwood%20Dr%2C%20Coppell%2C%20TX%2075019/1025%20Cherrywood%20Trl%2C%20Coppell%2C%20TX%2075019/922%20Laguna%20Dr%2C%20Coppell%2C%20TX%2075019/322%20Barclay%20Ave%2C%20Coppell%2C%20TX%2075019/109%20Sunrise%20Dr%2C%20Coppell%2C%20TX%2075019", "routexl_link": "https://www.routexl.com/?q=1048%20Creek%20Crossing%2C%20Coppell%2C%20TX%2075019%24204%20Driftwood%20Dr%2C%20Coppell%2C%20TX%2075019%241025%20Cherrywood%20Trl%2C%20Coppell%2C%20TX%2075019%24922%20Laguna%20Dr%2C%20Coppell%2C%20TX%2075019%24322%20Barclay%20Ave%2C%20Coppell%2C%20TX%2075019%24109%20Sunrise%20Dr%2C%20Coppell%2C%20TX%2075019&roundtrip=false&lang=en"}];
const COLORS = ['#f85149','#d29922','#3fb950','#58a6ff','#bc8cff','#f778ba','#39d2c0'];
const map = L.map('map').setView([32.972, -96.978], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '\u00a9 OSM', maxZoom: 19
}).addTo(map);

// Store route polyline layers so we can update them
const routePolylines = {};
const routeGroups = {};

// Draw initial markers for each route
ROUTES.forEach((route, ri) => {
  const color = COLORS[ri];
  const group = L.layerGroup().addTo(map);
  routeGroups[route.letter] = group;

  // Dashed straight-line placeholder (will be replaced by OSRM)
  const latlngs = route.stops.map(s => [s.lat, s.lon]);
  const pl = L.polyline(latlngs, { color, weight: 2, opacity: 0.3, dashArray: '4,6' }).addTo(group);
  routePolylines[route.letter] = pl;

  route.stops.forEach((stop, si) => {
    L.circleMarker([stop.lat, stop.lon], {
      radius: 8, fillColor: color, color: '#0d1117', weight: 2, opacity: 1, fillOpacity: 0.9
    }).bindPopup(
      '<b style="font-size:12px;color:#333">Route '+route.letter+' \u00b7 #'+(si+1)+'</b><br>'+
      '<b style="color:#333">'+stop.name+'</b><br><span style="color:#555">'+stop.address+'</span>'+
      (stop.signs>1?'<br><span style="color:#7c3aed;font-weight:600">'+stop.signs+' signs</span>':'')+
      (stop.notes?'<br><span style="color:#b45309;font-weight:600">'+stop.notes+'</span>':'')
    ).addTo(group);
    L.marker([stop.lat, stop.lon], {
      icon: L.divIcon({
        html: '<div style="width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">'+(si+1)+'</div>',
        className:'', iconSize:[16,16], iconAnchor:[8,8]
      }), interactive: false
    }).addTo(group);
  });
});

// Loading indicator
const loadDiv = document.createElement('div');
loadDiv.className = 'loading-msg';
loadDiv.id = 'load-status';
loadDiv.textContent = 'Fetching street routes from OSRM...';
document.getElementById('map').appendChild(loadDiv);

// Fetch OSRM routes client-side
async function fetchOSRMRoute(stops) {
  const coords = stops.map(s => s.lon + ',' + s.lat).join(';');
  const url = 'https://router.project-osrm.org/route/v1/driving/' + coords + '?overview=full&geometries=geojson';
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.code === 'Ok' && data.routes && data.routes[0]) {
      const geom = data.routes[0].geometry;
      const coords = geom.coordinates.map(c => [c[1], c[0]]); // GeoJSON is [lng,lat]
      const dist = (data.routes[0].distance / 1609.34).toFixed(1); // meters to miles
      const dur = Math.round(data.routes[0].duration / 60); // seconds to minutes
      return { coords, distance_mi: dist, duration_min: dur };
    }
  } catch(e) {
    console.error('OSRM error:', e);
  }
  return null;
}

async function loadAllRoutes() {
  let loaded = 0;
  for (let ri = 0; ri < ROUTES.length; ri++) {
    const route = ROUTES[ri];
    const color = COLORS[ri];
    const result = await fetchOSRMRoute(route.stops);
    if (result) {
      // Remove placeholder polyline
      routeGroups[route.letter].removeLayer(routePolylines[route.letter]);
      // Add real road polyline
      const realPl = L.polyline(result.coords, {
        color, weight: 4, opacity: 0.75
      }).addTo(routeGroups[route.letter]);
      routePolylines[route.letter] = realPl;
      // Store distance/duration
      route.osrm_dist = result.distance_mi;
      route.osrm_dur = result.duration_min;
      // Update sidebar info
      const infoEl = document.getElementById('info-'+route.letter);
      if (infoEl) infoEl.textContent = route.total_signs+' signs \u00b7 '+result.distance_mi+' mi \u00b7 ~'+result.duration_min+' min drive';
    }
    loaded++;
    document.getElementById('load-status').textContent = 'Routing: '+loaded+'/'+ROUTES.length+'...';
    // Rate limit: 1 req/sec for OSRM
    if (ri < ROUTES.length - 1) await new Promise(r => setTimeout(r, 1100));
  }
  const el = document.getElementById('load-status');
  el.textContent = '\u2713 All routes loaded (street-level)';
  el.className = 'loading-msg done';
  setTimeout(() => el.style.display = 'none', 3000);
}

// Build sidebar
const sb = document.getElementById('sidebar');
ROUTES.forEach((route, ri) => {
  const color = COLORS[ri];
  const card = document.createElement('div');
  card.className = 'route-card';
  card.id = 'card-'+route.letter;
  const stopsHtml = route.stops.map((s, si) => {
    let extra = '';
    if (s.signs > 1) extra += ' <span class="stop-signs">(x'+s.signs+')</span>';
    if (s.notes) extra += ' <span class="stop-notes">['+s.notes+']</span>';
    return '<div class="stop"><span class="stop-num">'+(si+1)+'.</span><div><span class="stop-name">'+s.name+'</span><br>'+s.address+extra+'</div></div>';
  }).join('');
  card.innerHTML =
    '<div class="route-header" onclick="toggleRoute(\''+route.letter+'\')">'+
      '<div class="route-badge" style="background:'+color+'">'+route.letter+'</div>'+
      '<div class="route-meta">'+
        '<div class="title">Route '+route.letter+' \u2014 '+route.stops.length+' stops</div>'+
        '<div class="info" id="info-'+route.letter+'">'+route.total_signs+' signs \u00b7 loading route...</div>'+
      '</div>'+
      '<div class="route-toggle">\u25BC</div>'+
    '</div>'+
    '<div class="route-stops">'+stopsHtml+
      '<div class="route-actions">'+
        '<a class="route-link routexl" href="'+route.routexl_link+'" target="_blank">\ud83d\udd00 RouteXL</a>'+
        '<a class="route-link gmaps" href="'+route.link+'" target="_blank">\ud83d\udccd Google Maps</a>'+
      '</div>'+
    '</div>';
  sb.appendChild(card);
});

function toggleRoute(letter) {
  const card = document.getElementById('card-'+letter);
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.route-card').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    const route = ROUTES.find(r => r.letter === letter);
    const pl = routePolylines[letter];
    if (pl && pl.getBounds) {
      try { map.fitBounds(pl.getBounds(), { padding: [40,40] }); } catch(e) {}
    } else {
      map.fitBounds(L.latLngBounds(route.stops.map(s => [s.lat, s.lon])), { padding: [40,40] });
    }
  }
}

// Legend
const legend = L.control({ position: 'bottomleft' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = ROUTES.map((r,i) =>
    '<div class="legend-item"><div class="legend-dot" style="background:'+COLORS[i]+'"></div>Route '+r.letter+' ('+r.stops.length+')<span class="legend-time" id="leg-time-'+r.letter+'"></span></div>'
  ).join('');
  return div;
};
legend.addTo(map);

// Kick off OSRM loading
loadAllRoutes();
</script>
