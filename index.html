<style>

  body { font-family: 'DM Sans', system-ui, sans-serif; background: #0c1117; color: #c9d1d9; }
  .header { background: #161b22; padding: 16px 24px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .header h1 { font-size: 20px; font-weight: 700; color: #f0f6fc; letter-spacing: -0.3px; }
  .header .stats { display: flex; gap: 20px; margin-left: auto; font-size: 13px; color: #8b949e; }
  .header .stats span { font-weight: 700; color: #f0f6fc; }
  .container { display: flex; height: calc(100vh - 56px); }
  #map { flex: 1; min-width: 0; }
  .sidebar { width: 400px; overflow-y: auto; background: #0d1117; border-left: 1px solid #30363d; }
  .route-card { border-bottom: 1px solid #21262d; }
  .route-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; transition: background .12s; }

  .route-badge { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #fff; flex-shrink: 0; }
  .route-meta { flex: 1; }
  .route-meta .title { font-weight: 600; font-size: 14px; color: #e6edf3; }
  .route-meta .info { font-size: 11px; color: #8b949e; margin-top: 1px; }
  .route-toggle { color: #484f58; font-size: 16px; transition: transform .2s; }
  .route-card.open .route-toggle { transform: rotate(180deg); }
  .route-stops { display: none; padding: 4px 14px 12px 56px; }
  .route-card.open .route-stops { display: block; }
  .stop { padding: 5px 0; font-size: 12px; color: #c9d1d9; display: flex; gap: 7px; line-height: 1.4; }
  .stop-num { color: #484f58; font-weight: 700; min-width: 18px; text-align: right; flex-shrink: 0; }
  .stop-name { font-weight: 600; color: #e6edf3; }
  .stop-notes { color: #d29922; font-size: 10px; font-weight: 600; }
  .stop-signs { color: #a371f7; font-size: 10px; font-weight: 600; }
  .route-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .route-link { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; color: #fff; border-radius: 5px; text-decoration: none; font-size: 12px; font-weight: 600; transition: opacity .15s; }
  .route-link:hover { opacity: .85; }
  .route-link.gmaps { background: #1f6feb; }
  .loading-msg { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(13,17,23,.9); border: 1px solid #30363d; border-radius: 6px; padding: 8px 14px; font-size: 12px; color: #8b949e; }
  .loading-msg.done { color: #3fb950; }
  .loading-msg.warn { color: #d29922; }
  .legend { position: absolute; bottom: 16px; left: 16px; z-index: 1000; background: rgba(13,17,23,.92); border: 1px solid #30363d; border-radius: 6px; padding: 10px 14px; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 7px; padding: 2px 0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
  @media (max-width: 768px) {
    .container { flex-direction: column; height: auto; }
    #map { height: 50vh; }
    .sidebar { width: 100%; height: 50vh; }
  }
</style>
</head>

const COLORS = ['#f85149','#d29922','#3fb950','#58a6ff','#bc8cff','#f778ba','#39d2c0','#f0883e','#7ee787','#79c0ff'];
const map = L.map('map').setView([32.972, -96.978], 14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OSM', maxZoom: 19 }).addTo(map);

const routeGroups = {};
const routePolylines = {};
const routeMarkers = {};

function escapeHtml(str) {
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function buildStats() {
  const routeCount = ROUTES.length;
  const stopCount = ROUTES.reduce((sum, r) => sum + r.stops.length, 0);
  const signCount = ROUTES.reduce((sum, r) => sum + r.stops.reduce((s, x) => s + (x.signs || 0), 0), 0);
  document.getElementById('stats').innerHTML = `
    <div><span>${routeCount}</span> Routes</div>
    <div><span>${stopCount}</span> Stops</div>
    <div><span>${signCount}</span> Signs</div>
  `;
}

function routeCacheKey(route) {
  const payload = {
    letter: route.letter,
    stops: route.stops.map(s => ({
      name: s.name,
      address: s.address,
      lat: s.lat,
      lon: s.lon,
      signs: s.signs || 0,
      notes: s.notes || ''
    }))
  };
  return 'osrm_route_v1_' + btoa(unescape(encodeURIComponent(JSON.stringify(payload)))).replace(/=+$/,'');
}

function loadRouteCache(route) {
  try {
    const raw = localStorage.getItem(routeCacheKey(route));
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function saveRouteCache(route, result) {
  try {
    localStorage.setItem(routeCacheKey(route), JSON.stringify(result));
  } catch (e) {}
}

function buildGoogleMapsLink(stops) {
  return 'https://www.google.com/maps/dir/' + stops.map(s => encodeURIComponent(s.address)).join('/');
}

function createPopupHtml(routeLetter, stopNumber, stop) {
  return '<b style="font-size:12px;color:#333">Route ' + routeLetter + ' · #' + stopNumber + '</b><br>' +
    '<b style="color:#333">' + escapeHtml(stop.name) + '</b><br>' +
    '<span style="color:#555">' + escapeHtml(stop.address) + '</span>' +
    (stop.signs > 1 ? '<br><span style="color:#7c3aed;font-weight:600">' + stop.signs + ' signs</span>' : '') +
    (stop.notes ? '<br><span style="color:#b45309;font-weight:600">' + escapeHtml(stop.notes) + '</span>' : '');
}

function renderSidebarStops(route) {
  return route.stops.map((s, si) => {
    let extra = '';
    if (s.signs > 1) extra += ' <span class="stop-signs">(x' + s.signs + ')</span>';
    if (s.notes) extra += ' <span class="stop-notes">[' + escapeHtml(s.notes) + ']</span>';
    return '<div class="stop"><span class="stop-num">' + (si + 1) + '.</span><div><span class="stop-name">' + escapeHtml(s.name) + '</span><br>' + escapeHtml(s.address) + extra + '</div></div>';
  }).join('') +
  '<div class="route-actions"><a class="route-link gmaps" id="gmaps-' + route.letter + '" href="' + buildGoogleMapsLink(route.stops) + '" target="_blank">📍 Google Maps</a></div>';
}

function drawBaseRoutes() {
  ROUTES.forEach((route, ri) => {
    const color = COLORS[ri % COLORS.length];
    const group = L.layerGroup().addTo(map);
    routeGroups[route.letter] = group;

    const latlngs = route.stops.map(s => [s.lat, s.lon]);
    routePolylines[route.letter] = L.polyline(latlngs, {
      color,
      weight: 2,
      opacity: 0.35,
      dashArray: '4,6'
    }).addTo(group);

    const markers = [];
    route.stops.forEach((stop, si) => {
      const circle = L.circleMarker([stop.lat, stop.lon], {
        radius: 8,
        fillColor: color,
        color: '#0d1117',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.9
      }).bindPopup(createPopupHtml(route.letter, si + 1, stop)).addTo(group);

      const number = L.marker([stop.lat, stop.lon], {
        icon: L.divIcon({
          html: '<div style="width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">' + (si + 1) + '</div>',
          className: '',
          iconSize: [16,16],
          iconAnchor: [8,8]
        }),
        interactive: false
      }).addTo(group);

      markers.push({ circle, number, stop });
    });

    routeMarkers[route.letter] = markers;
  });
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  ROUTES.forEach((route, ri) => {
    const color = COLORS[ri % COLORS.length];
    const card = document.createElement('div');
    card.className = 'route-card';
    card.id = 'card-' + route.letter;
    card.innerHTML =
      '<div class="route-header" onclick="toggleRoute(\'' + route.letter + '\')">' +
        '<div class="route-badge" style="background:' + color + '">' + route.letter + '</div>' +
        '<div class="route-meta"><div class="title">Route ' + route.letter + ' — ' + route.stops.length + ' stops</div>' +
        '<div class="info" id="info-' + route.letter + '">' + route.total_signs + ' signs · saved order pending</div></div>' +
        '<div class="route-toggle">▼</div>' +
      '</div>' +
      '<div class="route-stops" id="stops-' + route.letter + '">' + renderSidebarStops(route) + '</div>';
    sb.appendChild(card);
  });
}

function updateRouteInfo(route, text) {
  const infoEl = document.getElementById('info-' + route.letter);
  if (infoEl) infoEl.textContent = text;
}

function applyResult(ri, result, sourceLabel) {
  const route = ROUTES[ri];
  if (!result || !result.order || !result.coords) {
    updateRouteInfo(route, route.total_signs + ' signs · using original order');
    return;
  }

  const color = COLORS[ri % COLORS.length];
  const oldStops = [...route.stops];
  const oldMarkers = [...routeMarkers[route.letter]];
  const newStops = result.order.map(i => oldStops[i]);
  route.stops = newStops;

  routeGroups[route.letter].removeLayer(routePolylines[route.letter]);
  routePolylines[route.letter] = L.polyline(result.coords, {
    color,
    weight: 4,
    opacity: 0.78
  }).addTo(routeGroups[route.letter]);

  result.order.forEach((origIdx, newIdx) => {
    const marker = oldMarkers[origIdx];
    routeGroups[route.letter].removeLayer(marker.number);
    marker.number = L.marker([marker.stop.lat, marker.stop.lon], {
      icon: L.divIcon({
        html: '<div style="width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">' + (newIdx + 1) + '</div>',
        className: '',
        iconSize: [16,16],
        iconAnchor: [8,8]
      }),
      interactive: false
    }).addTo(routeGroups[route.letter]);
    marker.circle.setPopupContent(createPopupHtml(route.letter, newIdx + 1, marker.stop));
  });

  const stopsEl = document.getElementById('stops-' + route.letter);
  if (stopsEl) stopsEl.innerHTML = renderSidebarStops(route);

  route.osrm_dist = result.distance_mi;
  route.osrm_dur = result.duration_min;
  updateRouteInfo(route, route.total_signs + ' signs · ' + result.distance_mi + ' mi · ~' + result.duration_min + ' min' + (sourceLabel ? ' · ' + sourceLabel : ''));
}

function setStatus(text, cls) {
  const el = document.getElementById('load-status');
  el.textContent = text;
  el.className = 'loading-msg' + (cls ? ' ' + cls : '');
}

async function fetchOSRMTrip(stops, timeoutMs = 12000) {
  const coords = stops.map(s => s.lon + ',' + s.lat).join(';');
  const url = 'https://router.project-osrm.org/trip/v1/driving/' + coords + '?overview=full&geometries=geojson&roundtrip=false&source=any&destination=any';
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);

  try {
    const resp = await fetch(url, { signal: controller.signal, cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data.code !== 'Ok' || !data.trips || !data.trips[0]) throw new Error('OSRM code ' + data.code);

    const trip = data.trips[0];
    return {
      coords: trip.geometry.coordinates.map(c => [c[1], c[0]]),
      distance_mi: (trip.distance / 1609.34).toFixed(1),
      duration_min: Math.round(trip.duration / 60),
      order: data.waypoints.map(wp => wp.waypoint_index)
    };
  } catch (e) {
    console.warn('OSRM trip failed:', e);
    return null;
  } finally {
    clearTimeout(timer);
  }
}

async function optimizeAllRoutes() {
  let optimized = 0;
  let cached = 0;
  let failed = 0;

  for (let ri = 0; ri < ROUTES.length; ri++) {
    const route = ROUTES[ri];
    setStatus('Optimizing route ' + route.letter + ' (' + (ri + 1) + '/' + ROUTES.length + ')...', '');

    const cachedResult = loadRouteCache(route);
    if (cachedResult) {
      applyResult(ri, cachedResult, 'saved');
      cached += 1;
      continue;
    }

    const result = await fetchOSRMTrip(route.stops, 12000);
    if (result) {
      applyResult(ri, result, 'fresh');
      saveRouteCache(route, result);
      optimized += 1;
    } else {
      updateRouteInfo(route, route.total_signs + ' signs · original order (OSRM failed)');
      failed += 1;
    }
  }

  if (failed > 0) {
    setStatus('Done — ' + optimized + ' optimized, ' + cached + ' loaded from saved routes, ' + failed + ' left as original order', 'warn');
  } else {
    setStatus('Done — ' + optimized + ' optimized, ' + cached + ' loaded from saved routes', 'done');
  }

  setTimeout(() => {
    const el = document.getElementById('load-status');
    if (el) el.style.display = 'none';
  }, 5000);
}

function toggleRoute(letter) {
  const card = document.getElementById('card-' + letter);
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.route-card').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    const pl = routePolylines[letter];
    try {
      map.fitBounds(pl.getBounds(), { padding: [40, 40] });
    } catch (e) {
      const route = ROUTES.find(r => r.letter === letter);
      map.fitBounds(L.latLngBounds(route.stops.map(s => [s.lat, s.lon])), { padding: [40, 40] });
    }
  }
}
window.toggleRoute = toggleRoute;

function addLegend() {
  const legend = L.control({ position: 'bottomleft' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = ROUTES.map((r, i) =>
      '<div class="legend-item"><div class="legend-dot" style="background:' + COLORS[i % COLORS.length] + '"></div>Route ' + r.letter + ' (' + r.stops.length + ')</div>'
    ).join('');
    return div;
  };
  legend.addTo(map);
}

function addStatusBox() {
  const loadDiv = document.createElement('div');
  loadDiv.className = 'loading-msg';
  loadDiv.id = 'load-status';
  loadDiv.textContent = 'Preparing routes...';
  document.getElementById('map').appendChild(loadDiv);
}

buildStats();
drawBaseRoutes();
buildSidebar();
addStatusBox();
addLegend();
optimizeAllRoutes();
</script>
</body>
</html>
