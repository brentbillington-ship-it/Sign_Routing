const COLORS = ['#f85149','#d29922','#3fb950','#58a6ff','#bc8cff','#f778ba','#39d2c0','#f0883e','#7ee787','#79c0ff'];

const routeGroups = {};
const routePolylines = {};
const routeMarkers = {};

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function sumSigns(route) {
  return route.stops.reduce((sum, stop) => sum + (stop.signs || 0), 0);
}

function refreshStats() {
  const routes = ROUTES.length;
  const stops = ROUTES.reduce((sum, r) => sum + r.stops.length, 0);
  const signs = ROUTES.reduce((sum, r) => sum + sumSigns(r), 0);
  document.getElementById('stats').innerHTML = `<div><span>${routes}</span> Routes</div><div><span>${stops}</span> Stops</div><div><span>${signs}</span> Signs</div>`;
}

function buildGoogleMapsLink(stops) {
  return 'https://www.google.com/maps/dir/' + stops.map(s => encodeURIComponent(s.address)).join('/');
}

function routeDataSignature(route) {
  return JSON.stringify({
    letter: route.letter,
    stops: route.stops.map(s => ({
      name: s.name,
      address: s.address,
      lat: s.lat,
      lon: s.lon,
      signs: s.signs || 0,
      notes: s.notes || ''
    }))
  });
}

function cacheKeyForRoute(route) {
  return CACHE_PREFIX + route.letter;
}

function loadSavedRoute(route) {
  try {
    const raw = localStorage.getItem(cacheKeyForRoute(route));
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || parsed.signature !== routeDataSignature(route)) return null;
    return parsed.result || null;
  } catch (e) {
    return null;
  }
}

function saveRoute(route, result) {
  try {
    localStorage.setItem(cacheKeyForRoute(route), JSON.stringify({
      signature: routeDataSignature(route),
      result
    }));
  } catch (e) {}
}

function clearSavedRoute(route) {
  try { localStorage.removeItem(cacheKeyForRoute(route)); } catch (e) {}
}

function euclid(a, b) {
  const dx = a.lat - b.lat;
  const dy = a.lon - b.lon;
  return Math.sqrt(dx * dx + dy * dy);
}

function pathLength(stops) {
  let total = 0;
  for (let i = 0; i < stops.length - 1; i++) total += euclid(stops[i], stops[i + 1]);
  return total;
}

function reverseSlice(arr, start, end) {
  const out = arr.slice();
  while (start < end) {
    const tmp = out[start];
    out[start] = out[end];
    out[end] = tmp;
    start++;
    end--;
  }
  return out;
}

function optimizeStopOrderFromOriginal(stops) {
  if (stops.length < 4) return stops.slice();
  let best = stops.slice();
  let improved = true;
  let guard = 0;

  while (improved && guard < 12) {
    improved = false;
    guard += 1;
    for (let i = 1; i < best.length - 2; i++) {
      for (let k = i + 1; k < best.length - 1; k++) {
        const candidate = reverseSlice(best, i, k);
        if (pathLength(candidate) + 1e-9 < pathLength(best)) {
          best = candidate;
          improved = true;
        }
      }
    }
  }
  return best;
}

function popupHtml(letter, stopNum, stop) {
  return '<b style="font-size:12px;color:#333">Route ' + letter + ' · #' + stopNum + '</b><br>' +

    (stop.signs > 1 ? '<br><span style="color:#7c3aed;font-weight:600">' + stop.signs + ' signs</span>' : '') +
    (stop.notes ? '<br><span style="color:#b45309;font-weight:600">' + esc(stop.notes) + '</span>' : '');
}

function stopsHtml(route) {
  return route.stops.map((s, si) => {
    let extra = '';
    if (s.signs > 1) extra += ' <span class="stop-signs">(x' + s.signs + ')</span>';
    if (s.notes) extra += ' <span class="stop-notes">[' + esc(s.notes) + ']</span>';
    return '<div class="stop"><span class="stop-num">' + (si + 1) + '.</span><div><span class="stop-name">' + esc(s.name) + '</span><br>' + esc(s.address) + extra + '</div></div>';
  }).join('');
}

    '<button class="route-btn secondary" onclick="resetRoute(\'' + route.letter + '\')">Reset</button>' +
  '</div>';
}

function drawInitialRoutes() {
  ROUTES.forEach((route, ri) => {
    const color = COLORS[ri % COLORS.length];
    const group = L.layerGroup().addTo(map);
    routeGroups[route.letter] = group;

    const poly = L.polyline(route.stops.map(s => [s.lat, s.lon]), {
      color,
      weight: 2,
      opacity: 0.3,
      dashArray: '4,6'
    }).addTo(group);
    routePolylines[route.letter] = poly;

    const markers = [];
    route.stops.forEach((stop, si) => {
      const circle = L.circleMarker([stop.lat, stop.lon], {
        radius: 8,
        fillColor: color,
        color: '#0d1117',
        weight: 2,
        opacity: 1,
        fillOpacity: 0.9
      }).bindPopup(popupHtml(route.letter, si + 1, stop)).addTo(group);

      const number = L.marker([stop.lat, stop.lon], {
        icon: L.divIcon({
          html: '<div style="width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">' + (si + 1) + '</div>',
          className: '', iconSize:[16,16], iconAnchor:[8,8]
        }),
        interactive: false
      }).addTo(group);

      markers.push({ circle, number, stop });
    });
    routeMarkers[route.letter] = markers;
  });
}

async function fetchOSRMRoute(stops, timeoutMs = 20000) {
  const coords = stops.map(s => s.lon + ',' + s.lat).join(';');
  const url = 'https://router.project-osrm.org/route/v1/driving/' + coords + '?overview=full&geometries=geojson';
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const resp = await fetch(url, { signal: controller.signal, cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (data.code !== 'Ok' || !data.routes || !data.routes[0]) throw new Error(data.code || 'OSRM failed');
    const route = data.routes[0];
    return {
      coords: route.geometry.coordinates.map(c => [c[1], c[0]]),
      distance_mi: (route.distance / 1609.34).toFixed(1),
      duration_min: Math.round(route.duration / 60)
    };
  } catch (e) {
    console.warn('OSRM route failed:', e);
    return null;
  } finally {
    clearTimeout(timer);
  }
}

function applyRouteVisuals(route, ri, orderedStops, routeGeom, sourceLabel) {
  const color = COLORS[ri % COLORS.length];
  const oldMarkers = [...routeMarkers[route.letter]];
  const oldStops = [...route.stops];
  route.stops = orderedStops.slice();

  routeGroups[route.letter].removeLayer(routePolylines[route.letter]);
  routePolylines[route.letter] = L.polyline(routeGeom.coords || orderedStops.map(s => [s.lat, s.lon]), {
    color,
    weight: 4,
    opacity: 0.78
  }).addTo(routeGroups[route.letter]);

  const lookup = new Map();
  oldStops.forEach((stop, idx) => lookup.set(stop.name + '|' + stop.address, oldMarkers[idx]));
  routeMarkers[route.letter] = orderedStops.map((stop, newIdx) => {
    const marker = lookup.get(stop.name + '|' + stop.address);
    routeGroups[route.letter].removeLayer(marker.number);
    marker.number = L.marker([stop.lat, stop.lon], {
      icon: L.divIcon({
        html: '<div style="width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">' + (newIdx + 1) + '</div>',
        className:'', iconSize:[16,16], iconAnchor:[8,8]
      }),
      interactive:false
    }).addTo(routeGroups[route.letter]);
    marker.circle.setPopupContent(popupHtml(route.letter, newIdx + 1, stop));
    marker.stop = stop;
    return marker;
  });

  updateSidebarRoute(route);
  const distTxt = routeGeom.distance_mi ? ' · ' + routeGeom.distance_mi + ' mi · ~' + routeGeom.duration_min + ' min' : '';
  updateRouteInfo(route.letter, sumSigns(route) + ' signs' + distTxt + ' · ' + sourceLabel);
}

async function buildRoute(route, ri, saveResult) {
  const orderedStops = optimizeStopOrderFromOriginal(route.stops);
  const osrm = await fetchOSRMRoute(orderedStops, 20000);
  if (!osrm) {
    applyRouteVisuals(route, ri, orderedStops, { coords: orderedStops.map(s => [s.lat, s.lon]) }, 'local order');
    if (saveResult) saveRoute(route, { orderedStops, routeGeom: { coords: orderedStops.map(s => [s.lat, s.lon]) }, source: 'local order' });
    return false;
  }
  applyRouteVisuals(route, ri, orderedStops, osrm, 'saved route');
  if (saveResult) saveRoute(route, { orderedStops, routeGeom: osrm, source: 'saved route' });
  return true;
}

async function initializeRoutes() {
  let savedCount = 0;
  let rebuiltCount = 0;
  let localOnlyCount = 0;

  for (let ri = 0; ri < ROUTES.length; ri++) {
    const route = ROUTES[ri];
    setStatus('Loading route ' + route.letter + ' (' + (ri + 1) + '/' + ROUTES.length + ')...', '');

    const saved = loadSavedRoute(route);
    if (saved && saved.orderedStops && saved.routeGeom) {
      applyRouteVisuals(route, ri, saved.orderedStops, saved.routeGeom, saved.source || 'saved');
      savedCount += 1;
      continue;
    }

    const ok = await buildRoute(route, ri, true);
    if (ok) rebuiltCount += 1;
    else localOnlyCount += 1;
  }

  if (localOnlyCount > 0) {
    setStatus('Done — ' + savedCount + ' loaded from saved routes, ' + rebuiltCount + ' rebuilt, ' + localOnlyCount + ' using local order only', 'warn');
  } else {
    setStatus('Done — ' + savedCount + ' loaded from saved routes, ' + rebuiltCount + ' rebuilt', 'done');
  }
  setTimeout(() => { const el = document.getElementById('load-status'); if (el) el.style.display = 'none'; }, 5000);
}

async function reoptimizeRoute(letter) {
  const ri = ROUTES.findIndex(r => r.letter === letter);
  if (ri === -1) return;
  const route = ROUTES[ri];
  setStatus('Rebuilding route ' + letter + '...', '');
  clearSavedRoute(route);
  const ok = await buildRoute(route, ri, true);
  setStatus(ok ? 'Route ' + letter + ' rebuilt and saved' : 'Route ' + letter + ' rebuilt with local order only', ok ? 'done' : 'warn');
}
window.reoptimizeRoute = reoptimizeRoute;

async function resetRoute(letter) {
  const ri = ROUTES.findIndex(r => r.letter === letter);
  if (ri === -1) return;
  const route = ROUTES[ri];
  clearSavedRoute(route);
  route.stops = restoreOriginalRouteData(letter);
  const fallbackGeom = { coords: route.stops.map(s => [s.lat, s.lon]) };
  applyRouteVisuals(route, ri, route.stops, fallbackGeom, 'original order');
  updateRouteInfo(letter, sumSigns(route) + ' signs · original order');
  setStatus('Route ' + letter + ' reset to original order', 'done');
}
window.resetRoute = resetRoute;

function toggleRoute(letter) {
  const card = document.getElementById('card-' + letter);
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.route-card').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    const pl = routePolylines[letter];
    try { map.fitBounds(pl.getBounds(), { padding:[40,40] }); } catch (e) {
      const route = ROUTES.find(r => r.letter === letter);
      map.fitBounds(L.latLngBounds(route.stops.map(s => [s.lat, s.lon])), { padding:[40,40] });
    }
  }
}
window.toggleRoute = toggleRoute;
