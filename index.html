  .header .stats{display:flex;gap:20px;margin-left:auto;font-size:13px;color:#8b949e}
  .header .stats span{font-weight:700;color:#f0f6fc}
  .container{display:flex;height:calc(100vh - 56px)}
  #map{flex:1;min-width:0}
  .sidebar{width:400px;overflow-y:auto;background:#0d1117;border-left:1px solid #30363d}
  .route-card{border-bottom:1px solid #21262d}
  .route-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .12s}
  .route-header:hover{background:#161b22}
  .route-badge{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;flex-shrink:0}
  .route-meta{flex:1}
  .route-meta .title{font-weight:600;font-size:14px;color:#e6edf3}
  .route-meta .info{font-size:11px;color:#8b949e;margin-top:1px}
  .route-toggle{color:#484f58;font-size:16px;transition:transform .2s}
  .route-card.open .route-toggle{transform:rotate(180deg)}
  .route-stops{display:none;padding:4px 14px 12px 56px}
  .route-card.open .route-stops{display:block}
  .stop{padding:5px 0;font-size:12px;color:#c9d1d9;display:flex;gap:7px;line-height:1.4}
  .stop-num{color:#484f58;font-weight:700;min-width:18px;text-align:right;flex-shrink:0}

  .stop-signs{color:#a371f7;font-size:10px;font-weight:600}

  .route-link{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;color:#fff;border-radius:5px;text-decoration:none;font-size:12px;font-weight:600;transition:opacity .15s}

  .loading-msg{position:absolute;top:10px;right:10px;z-index:1000;background:rgba(13,17,23,.9);border:1px solid #30363d;border-radius:6px;padding:8px 14px;font-size:12px;color:#8b949e}
  .loading-msg.done{color:#3fb950}

// ============================================================
//  BUILD ROUTES from the PEOPLE array — no manual wiring needed.
//  Just change a person's "route" letter above and reload.
// ============================================================
const ROUTE_LETTERS = [...new Set(PEOPLE.map(p => p.route))].sort();

const ROUTES = ROUTE_LETTERS.map(letter => {
  const stops = PEOPLE
    .filter(p => p.route === letter)
    .map(p => ({
      name:    p.name,
      address: p.address,
      lat:     p.lat,
      lon:     p.lon,
      signs:   p.signs || 1,
      notes:   p.notes || ""
    }));
  const total_signs = stops.reduce((s, st) => s + st.signs, 0);
  const link = 'https://www.google.com/maps/dir/' + stops.map(s => encodeURIComponent(s.address)).join('/');
  return { letter, stops, total_signs, link, distance_mi: 0 };
});

// OSRM Trip — solves TSP with real street distances
async function fetchOSRMTrip(stops) {
  const coords = stops.map(s => s.lon+','+s.lat).join(';');
  const url = 'https://router.project-osrm.org/trip/v1/driving/'+coords+'?overview=full&geometries=geojson&roundtrip=false&source=any&destination=any';
  try {
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.code==='Ok' && data.trips && data.trips[0]) {
      const trip = data.trips[0];
      const geomCoords = trip.geometry.coordinates.map(c => [c[1],c[0]]);
      const dist = (trip.distance/1609.34).toFixed(1);
      const dur = Math.round(trip.duration/60);
      const order = data.waypoints.map(wp => wp.waypoint_index);
      return { coords: geomCoords, distance_mi: dist, duration_min: dur, order };
    }
  } catch(e) { console.error('OSRM trip error:', e); }
  return null;
}

async function applyResult(ri, result) {
  const route = ROUTES[ri];
  const color = COLORS[ri % COLORS.length];
  if (!result) return;
  routeGroups[route.letter].removeLayer(routePolylines[route.letter]);
  routePolylines[route.letter] = L.polyline(result.coords, {
    color, weight: 4, opacity: 0.75
  }).addTo(routeGroups[route.letter]);
  const oldStops = [...route.stops];
  const newStops = result.order.map(i => oldStops[i]);
  route.stops = newStops;
  const markers = routeMarkers[route.letter];
  const oldMarkers = [...markers];
  result.order.forEach((origIdx, newIdx) => {
    const m = oldMarkers[origIdx];
    routeGroups[route.letter].removeLayer(m.number);
    m.number = L.marker([m.stop.lat, m.stop.lon], {
      icon: L.divIcon({
        html: '<div style="width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff">'+(newIdx+1)+'</div>',
        className:'', iconSize:[16,16], iconAnchor:[8,8]
      }), interactive: false
    }).addTo(routeGroups[route.letter]);
    m.circle.setPopupContent(
      '<b style="font-size:12px;color:#333">Route '+route.letter+' \u00b7 #'+(newIdx+1)+'</b><br>'+
      '<b style="color:#333">'+m.stop.name+'</b><br><span style="color:#555">'+m.stop.address+'</span>'+
      (m.stop.signs>1?'<br><span style="color:#7c3aed;font-weight:600">'+m.stop.signs+' signs</span>':'')+
      (m.stop.notes?'<br><span style="color:#b45309;font-weight:600">'+m.stop.notes+'</span>':'')
    );
  });
  const gmLink = 'https://www.google.com/maps/dir/' + newStops.map(s => encodeURIComponent(s.address)).join('/');
  route.link = gmLink;
  const gmEl = document.getElementById('gmaps-'+route.letter);
  if (gmEl) gmEl.href = gmLink;
  const stopsEl = document.getElementById('stops-'+route.letter);
  if (stopsEl) {
    stopsEl.innerHTML = newStops.map((s, si) => {
      let extra = '';
      if (s.signs>1) extra += ' <span class="stop-signs">(x'+s.signs+')</span>';
      if (s.notes) extra += ' <span class="stop-notes">['+s.notes+']</span>';
      return '<div class="stop"><span class="stop-num">'+(si+1)+'.</span><div><span class="stop-name">'+s.name+'</span><br>'+s.address+extra+'</div></div>';
    }).join('') +
    '<div class="route-actions"><a class="route-link gmaps" id="gmaps-'+route.letter+'" href="'+gmLink+'" target="_blank">\ud83d\udccd Google Maps</a></div>';
  }
  route.osrm_dist = result.distance_mi;
  route.osrm_dur = result.duration_min;
  const infoEl = document.getElementById('info-'+route.letter);
  if (infoEl) infoEl.textContent = route.total_signs+' signs \u00b7 '+result.distance_mi+' mi \u00b7 ~'+result.duration_min+' min';
}

// Cache key based on stop coordinates so cache busts if data changes
const CACHE_KEY = 'osrm_v7_' + ROUTES.map(r => r.letter + r.stops.map(s => s.lat+','+s.lon).join(';')).join('|').length;

function saveCache(allResults) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(allResults)); } catch(e) {}
}
function loadCache() {
  try { const c = localStorage.getItem(CACHE_KEY); return c ? JSON.parse(c) : null; } catch(e) { return null; }
}

async function loadAllRoutes() {
  const cached = loadCache();
  if (cached) {
    cached.forEach(({ri, result}) => applyResult(ri, result));
    const el = document.getElementById('load-status');
    el.textContent = '\u2713 Routes loaded (cached)';
    el.className = 'loading-msg done';
    setTimeout(() => el.style.display='none', 2000);
    return;
  }

  // *** FIX: Sequential requests with a small delay to avoid
  //     hammering the public OSRM server (which rate-limits
  //     parallel requests and causes the "stuck optimizing" bug). ***
  const results = [];
  const el = document.getElementById('load-status');
  for (let ri = 0; ri < ROUTES.length; ri++) {
    el.textContent = 'Optimizing route ' + ROUTES[ri].letter + ' (' + (ri+1) + '/' + ROUTES.length + ')...';
    const result = await fetchOSRMTrip(ROUTES[ri].stops);
    results.push({ ri, result });
    applyResult(ri, result);
    // Small delay between requests to be polite to the public server
    if (ri < ROUTES.length - 1) await new Promise(r => setTimeout(r, 300));
  }

  saveCache(results);
  el.textContent = '\u2713 Routes optimized (street-level)';
  el.className = 'loading-msg done';
  setTimeout(() => el.style.display='none', 3000);
}

  }).join('');
  card.innerHTML =
    '<div class="route-header" onclick="toggleRoute(\''+route.letter+'\')">'+
      '<div class="route-badge" style="background:'+color+'">'+route.letter+'</div>'+
      '<div class="route-meta"><div class="title">Route '+route.letter+' \u2014 '+route.stops.length+' stops</div>'+
      '<div class="info" id="info-'+route.letter+'">'+route.total_signs+' signs \u00b7 optimizing...</div></div>'+
      '<div class="route-toggle">\u25BC</div></div>'+
    '<div class="route-stops" id="stops-'+route.letter+'">'+stopsHtml+
      '<div class="route-actions">'+
        '<a class="route-link gmaps" id="gmaps-'+route.letter+'" href="'+route.link+'" target="_blank">\ud83d\udccd Google Maps</a>'+
      '</div></div>';
  sb.appendChild(card);
});

function toggleRoute(letter) {
  const card = document.getElementById('card-'+letter);
  const wasOpen = card.classList.contains('open');
  document.querySelectorAll('.route-card').forEach(c => c.classList.remove('open'));
  if (!wasOpen) {
    card.classList.add('open');
    const pl = routePolylines[letter];
    try { map.fitBounds(pl.getBounds(), {padding:[40,40]}); } catch(e) {
      const route = ROUTES.find(r => r.letter===letter);
      map.fitBounds(L.latLngBounds(route.stops.map(s=>[s.lat,s.lon])),{padding:[40,40]});
    }
  }
}

const legend = L.control({position:'bottomleft'});
legend.onAdd = function() {
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = ROUTES.map((r,i) =>
    '<div class="legend-item"><div class="legend-dot" style="background:'+COLORS[i%COLORS.length]+'"></div>Route '+r.letter+' ('+r.stops.length+')</div>'
  ).join('');
  return div;
};
legend.addTo(map);
loadAllRoutes();
</script>
</body>
</html>
